name: Deploy — Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação a executar'
        required: true
        default: 'apply'
        type: choice
        options: [apply, destroy]

env:
  TF_VERSION: '1.8.5'
  PYTHON_VERSION: '3.11'
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  changes:
    name: Detecta mudanças
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'

  build:
    name: Build & Push imagem
    runs-on: ubuntu-latest
    needs: changes
    if: always() && github.event_name == 'push' && !contains(needs.*.result, 'failure')
    outputs:
      image: ${{ steps.meta.outputs.image }}
      acr_name: ${{ steps.acr_info.outputs.acr_name }}
      acr_login_server: ${{ steps.acr_info.outputs.acr_login_server }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Lê ACR do state
        id: acr_info
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Docker login no ACR
        run: az acr login --name "${{ steps.acr_info.outputs.acr_name }}"
        working-directory: .

      - name: Build e push
        id: meta
        working-directory: .
        run: |
          IMAGE="${{ steps.acr_info.outputs.acr_login_server }}/pessoas-api"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: |
      always() && !contains(needs.*.result, 'failure') && (
        (github.event_name == 'push' && needs.changes.outputs.terraform == 'true') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
      )
    outputs:
      app_url: ${{ steps.tf_output.outputs.app_url }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="app_image=${{ needs.build.outputs.image }}"

      - name: Captura outputs
        id: tf_output
        run: echo "app_url=$(terraform output -raw app_url)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Atualiza Container App
    runs-on: ubuntu-latest
    needs: [build, terraform]
    if: always() && needs.build.result == 'success' && !contains(needs.terraform.result, 'failure')

    steps:
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Atualiza imagem e envs
        run: |
          az containerapp update \
            --name ca-faa-pessoas \
            --resource-group rg-azure-estudo \
            --image "${{ needs.build.outputs.image }}" \
            --set-env-vars "DB_HOST=${{ secrets.DB_HOST }}" "DB_NAME=adp_test" "DB_USER=pgadmin"

  migrate:
    name: Migration
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instala dependências
        run: pip install psycopg2-binary

      - name: Roda migrations
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: adp_test
          DB_USER: pgadmin
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python migrate.py

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
