name: Deploy — Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VERSION: '1.8.5'
  PYTHON_VERSION: '3.11'
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    outputs:
      acr_login_server: ${{ steps.tf_output.outputs.acr_login_server }}
      acr_name: ${{ steps.tf_output.outputs.acr_name }}
      app_url: ${{ steps.tf_output.outputs.app_url }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Captura outputs
        id: tf_output
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "app_url=$(terraform output -raw app_url)" >> "$GITHUB_OUTPUT"

  migrate:
    name: Migration
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instala dependências
        run: pip install psycopg2-binary

      - name: Roda migrations
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: adp_test
          DB_USER: pgadmin
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python migrate.py

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [terraform, migrate]

    steps:
      - uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build e push imagem no ACR
        run: |
          az acr build \
            --registry "${{ needs.terraform.outputs.acr_name }}" \
            --image pessoas-api:${{ github.sha }} \
            --image pessoas-api:latest \
            .

      - name: Atualiza revisão do Container App
        run: |
          az containerapp update \
            --name ca-faa-pessoas \
            --resource-group rg-azure-estudo \
            --image "${{ needs.terraform.outputs.acr_login_server }}/pessoas-api:${{ github.sha }}"

      - name: URL da aplicação
        run: echo "App disponível em ${{ needs.terraform.outputs.app_url }}"
